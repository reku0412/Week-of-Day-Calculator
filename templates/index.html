<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
    <title>Weekday Calculator</title>
</head>
<body>

<div class="container">

    <h1>📅 Date Utility</h1>
    <p class="subtitle">入力した日付を分析します</p>

    <form method="POST">

        <label for="date">日付を選択</label>

        <input
            type="date"
            id="date"
            name="date"
            required>

        <button type="submit">
            🔍 Analyze Date
        </button>

    </form>

    {% if weekday %}

    <div class="result">

        <h2>📊 Date Information</h2>

        <div class="selected-date">
        {{ year }}年{{ month }}月{{ day }}日
        </div>

        <div class="info-card">
            <h3>🗓️ 曜日</h3>
            <p>{{ weekday }}</p>
        </div>

        <div class="info-card">
            <h3>🌏 閏年</h3>
            <p>{{ leap }}</p>
        </div>

        <div class="info-card">
            <h3>📆 年初からの日数</h3>
            <p>{{ day_of_year }} 日目</p>
        </div>

        <div class="info-card">
            <h3>⏳ 年末まで</h3>
            <p>あと {{ remaining_days }} 日</p>
        </div>

    </div>

    {% endif %}

    {% if result %}
        <div class="error">
            {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
