<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
    <title>Weekday Calculator</title>
</head>
<body>

<div class="container">

    <h1>📅 Weekday Calculator</h1>

    <form method="POST">

        <label>年</label>
        <input type="number" name="year" required>

        <label>月</label>
        <input type="number" name="month" min="1" max="12" required>

        <label>日</label>
        <input type="number" name="day" min="1" max="31" required>

        <button type="submit">
            曜日を計算
        </button>

    </form>

    {% if result %}
    <div class="result">
        {{ result }}
    </div>
    {% endif %}

</div>

</body>
</html>
